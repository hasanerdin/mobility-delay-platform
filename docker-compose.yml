services:

  db:
    image: postgres:15
    container_name: mobility_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: mobility_api
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app

  airflow-webserver:
    image: apache/airflow:2.9.1
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_webserver
    depends_on:
      - db
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://user:password@db:5432/mobility
      AIRFLOW__WEBSERVER__SECRET_KEY: my_super_secret_key
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    ports:
      - "8080:8080"
    env_file:
      - .env
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.1
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    depends_on:
      - airflow-webserver
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://user:password@db:5432/mobility
      AIRFLOW__WEBSERVER__SECRET_KEY: my_super_secret_key
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    env_file:
      - .env
    command: scheduler

  airflow-init:
    image: apache/airflow:2.9.1
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - db
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://user:password@db:5432/mobility
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    env_file:
      - .env
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db init &&
      airflow users list | grep airflow ||
      airflow users create --username airflow --password airflow --firstname admin --lastname admin --role Admin --email admin@example.com
      "

volumes:
  db_data: